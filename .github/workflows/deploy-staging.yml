name: Deploy Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  STAGING_VERSION: 3.2.9
  AZ_RESOURCE_GROUP: ${{ vars.AZ_RESOURCE_GROUP }}
  AZ_ACR_NAME: ${{ vars.AZ_ACR_NAME }}
  AZ_WEB_APP_NAME: ${{ vars.AZ_WEB_APP_NAME }}
  AZ_WORKER_APP_NAME: ${{ vars.AZ_WORKER_APP_NAME }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      deploy_web: ${{ steps.changes.outputs.deploy_web }}
      deploy_worker: ${{ steps.changes.outputs.deploy_worker }}
      any: ${{ steps.changes.outputs.any }}
      db_sql_changed: ${{ steps.changes.outputs.db_sql_changed }}
      reason: ${{ steps.changes.outputs.reason }}
      changed_paths: ${{ steps.changes.outputs.changed_paths }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Compute staging metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          APP_VERSION="$(node scripts/staging-version.cjs from-file .github/workflows/deploy-staging.yml)"
          IMAGE_TAG="${GITHUB_SHA::12}"
          echo "app_version=${APP_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Determine deployment targets
        id: changes
        shell: bash
        run: scripts/ci/detect-staging-targets.sh "${{ github.event_name }}" "${{ github.event.before }}"

      - name: Show staging metadata
        shell: bash
        run: |
          echo "STAGING_VERSION=${STAGING_VERSION}"
          echo "APP_VERSION=${{ steps.meta.outputs.app_version }}"
          echo "IMAGE_TAG=${{ steps.meta.outputs.image_tag }}"
          echo "deploy_web=${{ steps.changes.outputs.deploy_web }}"
          echo "deploy_worker=${{ steps.changes.outputs.deploy_worker }}"
          echo "any=${{ steps.changes.outputs.any }}"
          echo "db_sql_changed=${{ steps.changes.outputs.db_sql_changed }}"
          echo "reason=${{ steps.changes.outputs.reason }}"
          echo "changed_paths=${{ steps.changes.outputs.changed_paths }}"

      - name: Validate shared Azure variables
        if: steps.changes.outputs.any == 'true'
        shell: bash
        run: scripts/ci/validate-required-env.sh AZ_RESOURCE_GROUP AZ_ACR_NAME AZ_WEB_APP_NAME AZ_WORKER_APP_NAME

  await_db_migration_approval:
    needs: prepare
    if: needs.prepare.outputs.db_sql_changed == 'true'
    runs-on: ubuntu-latest
    environment: staging-db-migrations
    steps:
      - name: Await manual DB migration confirmation
        shell: bash
        run: |
          echo "DB SQL changes were detected under db/**/*.sql."
          echo "Apply DB migrations externally, then approve this environment to continue deployment."
          echo "changed_paths=${{ needs.prepare.outputs.changed_paths }}"

  deploy_web:
    needs: [prepare, await_db_migration_approval]
    if: ${{ always() && needs.prepare.outputs.deploy_web == 'true' && (needs.prepare.outputs.db_sql_changed != 'true' || needs.await_db_migration_approval.result == 'success') }}
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      app_name: ${{ steps.deploy_meta.outputs.app_name }}
      revision: ${{ steps.deploy_meta.outputs.revision }}
      fqdn: ${{ steps.deploy_meta.outputs.fqdn }}
      url: ${{ steps.deploy_meta.outputs.url }}
      image: ${{ steps.deploy_meta.outputs.image }}
    env:
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
      IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Show app version
        shell: bash
        run: |
          echo "STAGING_VERSION=${STAGING_VERSION}"
          echo "APP_VERSION=${APP_VERSION}"
          echo "IMAGE_TAG=${IMAGE_TAG}"

      - name: Web checks (tests + build)
        shell: bash
        run: |
          set -euo pipefail
          cd web
          npm ci
          APP_VERSION="${APP_VERSION}" npm test
          APP_VERSION="${APP_VERSION}" npm run build

      - name: Azure CLI login (OIDC)
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: scripts/ci/azure-oidc-login.sh

      - name: Ensure Azure CLI extensions
        shell: bash
        run: |
          az config set extension.use_dynamic_install=yes_without_prompt
          az extension add --name containerapp --upgrade

      - name: Validate web staging runtime config
        shell: bash
        env:
          STG_DATABASE_URL: ${{ secrets.STG_DATABASE_URL }}
          STG_ENTRA_CLIENT_SECRET: ${{ secrets.STG_ENTRA_CLIENT_SECRET }}
          STG_NEXTAUTH_SECRET: ${{ secrets.STG_NEXTAUTH_SECRET }}
          STG_WORKER_INTERNAL_API_TOKEN: ${{ secrets.STG_WORKER_INTERNAL_API_TOKEN }}
          STG_WORKER_HEARTBEAT_TOKEN: ${{ secrets.STG_WORKER_HEARTBEAT_TOKEN }}
          STG_ENTRA_TENANT_ID: ${{ vars.STG_ENTRA_TENANT_ID }}
          STG_ENTRA_CLIENT_ID: ${{ vars.STG_ENTRA_CLIENT_ID }}
          STG_ADMIN_GROUP_ID: ${{ vars.STG_ADMIN_GROUP_ID }}
          STG_USER_GROUP_ID: ${{ vars.STG_USER_GROUP_ID }}
          STG_INTERNAL_EMAIL_DOMAINS: ${{ vars.STG_INTERNAL_EMAIL_DOMAINS }}
          STG_DASHBOARD_DORMANT_LOOKBACK_DAYS: ${{ vars.STG_DASHBOARD_DORMANT_LOOKBACK_DAYS }}
        run: |
          scripts/ci/validate-required-env.sh \
            STG_DATABASE_URL \
            STG_ENTRA_CLIENT_SECRET \
            STG_NEXTAUTH_SECRET \
            STG_WORKER_INTERNAL_API_TOKEN \
            STG_WORKER_HEARTBEAT_TOKEN \
            STG_ENTRA_TENANT_ID \
            STG_ENTRA_CLIENT_ID \
            STG_ADMIN_GROUP_ID \
            STG_USER_GROUP_ID \
            STG_INTERNAL_EMAIL_DOMAINS \
            STG_DASHBOARD_DORMANT_LOOKBACK_DAYS

      - name: Sync web staging runtime config
        shell: bash
        env:
          STG_DATABASE_URL: ${{ secrets.STG_DATABASE_URL }}
          STG_ENTRA_CLIENT_SECRET: ${{ secrets.STG_ENTRA_CLIENT_SECRET }}
          STG_NEXTAUTH_SECRET: ${{ secrets.STG_NEXTAUTH_SECRET }}
          STG_WORKER_INTERNAL_API_TOKEN: ${{ secrets.STG_WORKER_INTERNAL_API_TOKEN }}
          STG_WORKER_HEARTBEAT_TOKEN: ${{ secrets.STG_WORKER_HEARTBEAT_TOKEN }}
          STG_NEXTAUTH_URL: ${{ vars.STG_NEXTAUTH_URL }}
          STG_WORKER_API_URL: ${{ vars.STG_WORKER_API_URL }}
          STG_WORKER_HEARTBEAT_URL: ${{ vars.STG_WORKER_HEARTBEAT_URL || vars.WORKER_HEARTBEAT_URL }}
          STG_ENTRA_TENANT_ID: ${{ vars.STG_ENTRA_TENANT_ID }}
          STG_ENTRA_CLIENT_ID: ${{ vars.STG_ENTRA_CLIENT_ID }}
          STG_ADMIN_GROUP_ID: ${{ vars.STG_ADMIN_GROUP_ID }}
          STG_USER_GROUP_ID: ${{ vars.STG_USER_GROUP_ID }}
          STG_INTERNAL_EMAIL_DOMAINS: ${{ vars.STG_INTERNAL_EMAIL_DOMAINS }}
          STG_DASHBOARD_DORMANT_LOOKBACK_DAYS: ${{ vars.STG_DASHBOARD_DORMANT_LOOKBACK_DAYS }}
          STG_LICENSE_PUBLIC_KEY_PATH: ${{ vars.STG_LICENSE_PUBLIC_KEY_PATH }}
          STG_LICENSE_CACHE_TTL_SECONDS: ${{ vars.STG_LICENSE_CACHE_TTL_SECONDS }}
          STG_DB_CONNECT_TIMEOUT_SECONDS: ${{ vars.STG_DB_CONNECT_TIMEOUT_SECONDS }}
          STG_SCHEDULER_POLL_SECONDS: ${{ vars.STG_SCHEDULER_POLL_SECONDS }}
          STG_GRAPH_BASE: ${{ vars.STG_GRAPH_BASE }}
          STG_GRAPH_MAX_CONCURRENCY: ${{ vars.STG_GRAPH_MAX_CONCURRENCY }}
          STG_GRAPH_MAX_RETRIES: ${{ vars.STG_GRAPH_MAX_RETRIES }}
          STG_GRAPH_CONNECT_TIMEOUT: ${{ vars.STG_GRAPH_CONNECT_TIMEOUT }}
          STG_GRAPH_READ_TIMEOUT: ${{ vars.STG_GRAPH_READ_TIMEOUT }}
          STG_GRAPH_PAGE_SIZE: ${{ vars.STG_GRAPH_PAGE_SIZE }}
          STG_GRAPH_PERMISSIONS_BATCH_SIZE: ${{ vars.STG_GRAPH_PERMISSIONS_BATCH_SIZE }}
          STG_GRAPH_PERMISSIONS_STALE_AFTER_HOURS: ${{ vars.STG_GRAPH_PERMISSIONS_STALE_AFTER_HOURS }}
          STG_FLUSH_EVERY: ${{ vars.STG_FLUSH_EVERY }}
        run: scripts/ci/sync-staging-web-config.sh

      - name: Build and push web image to ACR
        shell: bash
        run: |
          set -euo pipefail
          az acr build \
            --registry "${AZ_ACR_NAME}" \
            --resource-group "${AZ_RESOURCE_GROUP}" \
            --image "sentinel-web:${IMAGE_TAG}" \
            ./web

      - name: Resolve ACR login server
        id: acr
        shell: bash
        run: |
          set -euo pipefail
          ACR_LOGIN_SERVER="$(az acr show \
            --name "${AZ_ACR_NAME}" \
            --resource-group "${AZ_RESOURCE_GROUP}" \
            --query "loginServer" \
            --output tsv)"
          echo "login_server=${ACR_LOGIN_SERVER}" >> "${GITHUB_OUTPUT}"

      - name: Update web app to new image
        shell: bash
        run: |
          set -euo pipefail
          az containerapp update \
            --name "${AZ_WEB_APP_NAME}" \
            --resource-group "${AZ_RESOURCE_GROUP}" \
            --image "${{ steps.acr.outputs.login_server }}/sentinel-web:${IMAGE_TAG}"

      - name: Export deployed web metadata
        id: deploy_meta
        shell: bash
        run: scripts/ci/export-containerapp-deploy-metadata.sh "${AZ_WEB_APP_NAME}"

      - name: Show deployed web revision
        shell: bash
        run: scripts/ci/show-containerapp-revision.sh "${AZ_WEB_APP_NAME}"

  deploy_worker:
    needs: [prepare, await_db_migration_approval, deploy_web]
    if: ${{ always() && needs.prepare.outputs.deploy_worker == 'true' && needs.deploy_web.result != 'failure' && needs.deploy_web.result != 'cancelled' && (needs.prepare.outputs.db_sql_changed != 'true' || needs.await_db_migration_approval.result == 'success') }}
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      app_name: ${{ steps.deploy_meta.outputs.app_name }}
      revision: ${{ steps.deploy_meta.outputs.revision }}
      fqdn: ${{ steps.deploy_meta.outputs.fqdn }}
      url: ${{ steps.deploy_meta.outputs.url }}
      image: ${{ steps.deploy_meta.outputs.image }}
    env:
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
      IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Show app version
        shell: bash
        run: |
          echo "STAGING_VERSION=${STAGING_VERSION}"
          echo "APP_VERSION=${APP_VERSION}"
          echo "IMAGE_TAG=${IMAGE_TAG}"

      - name: Worker checks (tests + compile)
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r worker/requirements.txt
          python -m unittest discover -s worker/tests -p "test_*.py"
          python -m py_compile worker/app/*.py worker/app/jobs/*.py

      - name: Azure CLI login (OIDC)
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: scripts/ci/azure-oidc-login.sh

      - name: Ensure Azure CLI extensions
        shell: bash
        run: |
          az config set extension.use_dynamic_install=yes_without_prompt
          az extension add --name containerapp --upgrade

      - name: Validate worker staging runtime config
        shell: bash
        env:
          STG_DATABASE_URL: ${{ secrets.STG_DATABASE_URL }}
          STG_APPINSIGHTS_API_KEY: ${{ secrets.STG_APPINSIGHTS_API_KEY || secrets.APPINSIGHTS_API_KEY }}
          STG_ENTRA_CLIENT_SECRET: ${{ secrets.STG_ENTRA_CLIENT_SECRET }}
          STG_WORKER_INTERNAL_API_TOKEN: ${{ secrets.STG_WORKER_INTERNAL_API_TOKEN }}
          STG_WORKER_HEARTBEAT_TOKEN: ${{ secrets.STG_WORKER_HEARTBEAT_TOKEN }}
          STG_APPINSIGHTS_APP_ID: ${{ vars.STG_APPINSIGHTS_APP_ID || vars.APPINSIGHTS_APP_ID }}
          STG_ENTRA_TENANT_ID: ${{ vars.STG_ENTRA_TENANT_ID }}
          STG_ENTRA_CLIENT_ID: ${{ vars.STG_ENTRA_CLIENT_ID }}
          STG_INTERNAL_EMAIL_DOMAINS: ${{ vars.STG_INTERNAL_EMAIL_DOMAINS }}
          STG_DB_CONNECT_TIMEOUT_SECONDS: ${{ vars.STG_DB_CONNECT_TIMEOUT_SECONDS }}
          STG_SCHEDULER_POLL_SECONDS: ${{ vars.STG_SCHEDULER_POLL_SECONDS }}
          STG_GRAPH_BASE: ${{ vars.STG_GRAPH_BASE }}
          STG_GRAPH_MAX_CONCURRENCY: ${{ vars.STG_GRAPH_MAX_CONCURRENCY }}
          STG_GRAPH_MAX_RETRIES: ${{ vars.STG_GRAPH_MAX_RETRIES }}
          STG_GRAPH_CONNECT_TIMEOUT: ${{ vars.STG_GRAPH_CONNECT_TIMEOUT }}
          STG_GRAPH_READ_TIMEOUT: ${{ vars.STG_GRAPH_READ_TIMEOUT }}
          STG_GRAPH_PAGE_SIZE: ${{ vars.STG_GRAPH_PAGE_SIZE }}
          STG_GRAPH_PERMISSIONS_BATCH_SIZE: ${{ vars.STG_GRAPH_PERMISSIONS_BATCH_SIZE }}
          STG_GRAPH_PERMISSIONS_STALE_AFTER_HOURS: ${{ vars.STG_GRAPH_PERMISSIONS_STALE_AFTER_HOURS }}
          STG_FLUSH_EVERY: ${{ vars.STG_FLUSH_EVERY }}
        run: |
          scripts/ci/validate-required-env.sh \
            STG_DATABASE_URL \
            STG_APPINSIGHTS_API_KEY \
            STG_ENTRA_CLIENT_SECRET \
            STG_WORKER_INTERNAL_API_TOKEN \
            STG_WORKER_HEARTBEAT_TOKEN \
            STG_APPINSIGHTS_APP_ID \
            STG_ENTRA_TENANT_ID \
            STG_ENTRA_CLIENT_ID \
            STG_INTERNAL_EMAIL_DOMAINS \
            STG_DB_CONNECT_TIMEOUT_SECONDS \
            STG_SCHEDULER_POLL_SECONDS \
            STG_GRAPH_BASE \
            STG_GRAPH_MAX_CONCURRENCY \
            STG_GRAPH_MAX_RETRIES \
            STG_GRAPH_CONNECT_TIMEOUT \
            STG_GRAPH_READ_TIMEOUT \
            STG_GRAPH_PAGE_SIZE \
            STG_GRAPH_PERMISSIONS_BATCH_SIZE \
            STG_GRAPH_PERMISSIONS_STALE_AFTER_HOURS \
            STG_FLUSH_EVERY

      - name: Sync worker staging runtime config
        shell: bash
        env:
          STG_DATABASE_URL: ${{ secrets.STG_DATABASE_URL }}
          STG_APPINSIGHTS_API_KEY: ${{ secrets.STG_APPINSIGHTS_API_KEY || secrets.APPINSIGHTS_API_KEY }}
          STG_ENTRA_CLIENT_SECRET: ${{ secrets.STG_ENTRA_CLIENT_SECRET }}
          STG_WORKER_INTERNAL_API_TOKEN: ${{ secrets.STG_WORKER_INTERNAL_API_TOKEN }}
          STG_WORKER_HEARTBEAT_TOKEN: ${{ secrets.STG_WORKER_HEARTBEAT_TOKEN }}
          STG_WORKER_HEARTBEAT_URL: ${{ vars.STG_WORKER_HEARTBEAT_URL || vars.WORKER_HEARTBEAT_URL }}
          STG_APPINSIGHTS_APP_ID: ${{ vars.STG_APPINSIGHTS_APP_ID || vars.APPINSIGHTS_APP_ID }}
          STG_ENTRA_TENANT_ID: ${{ vars.STG_ENTRA_TENANT_ID }}
          STG_ENTRA_CLIENT_ID: ${{ vars.STG_ENTRA_CLIENT_ID }}
          STG_INTERNAL_EMAIL_DOMAINS: ${{ vars.STG_INTERNAL_EMAIL_DOMAINS }}
          STG_LICENSE_PUBLIC_KEY_PATH: ${{ vars.STG_LICENSE_PUBLIC_KEY_PATH }}
          STG_LICENSE_CACHE_TTL_SECONDS: ${{ vars.STG_LICENSE_CACHE_TTL_SECONDS }}
          STG_DB_CONNECT_TIMEOUT_SECONDS: ${{ vars.STG_DB_CONNECT_TIMEOUT_SECONDS }}
          STG_SCHEDULER_POLL_SECONDS: ${{ vars.STG_SCHEDULER_POLL_SECONDS }}
          STG_GRAPH_BASE: ${{ vars.STG_GRAPH_BASE }}
          STG_GRAPH_MAX_CONCURRENCY: ${{ vars.STG_GRAPH_MAX_CONCURRENCY }}
          STG_GRAPH_MAX_RETRIES: ${{ vars.STG_GRAPH_MAX_RETRIES }}
          STG_GRAPH_CONNECT_TIMEOUT: ${{ vars.STG_GRAPH_CONNECT_TIMEOUT }}
          STG_GRAPH_READ_TIMEOUT: ${{ vars.STG_GRAPH_READ_TIMEOUT }}
          STG_GRAPH_PAGE_SIZE: ${{ vars.STG_GRAPH_PAGE_SIZE }}
          STG_GRAPH_PERMISSIONS_BATCH_SIZE: ${{ vars.STG_GRAPH_PERMISSIONS_BATCH_SIZE }}
          STG_GRAPH_PERMISSIONS_STALE_AFTER_HOURS: ${{ vars.STG_GRAPH_PERMISSIONS_STALE_AFTER_HOURS }}
          STG_FLUSH_EVERY: ${{ vars.STG_FLUSH_EVERY }}
        run: scripts/ci/sync-staging-worker-config.sh

      - name: Build and push worker image to ACR
        shell: bash
        run: |
          set -euo pipefail
          az acr build \
            --registry "${AZ_ACR_NAME}" \
            --resource-group "${AZ_RESOURCE_GROUP}" \
            --image "sentinel-worker:${IMAGE_TAG}" \
            ./worker

      - name: Resolve ACR login server
        id: acr
        shell: bash
        run: |
          set -euo pipefail
          ACR_LOGIN_SERVER="$(az acr show \
            --name "${AZ_ACR_NAME}" \
            --resource-group "${AZ_RESOURCE_GROUP}" \
            --query "loginServer" \
            --output tsv)"
          echo "login_server=${ACR_LOGIN_SERVER}" >> "${GITHUB_OUTPUT}"

      - name: Update worker app to new image
        shell: bash
        run: |
          set -euo pipefail
          az containerapp update \
            --name "${AZ_WORKER_APP_NAME}" \
            --resource-group "${AZ_RESOURCE_GROUP}" \
            --image "${{ steps.acr.outputs.login_server }}/sentinel-worker:${IMAGE_TAG}"

      - name: Export deployed worker metadata
        id: deploy_meta
        shell: bash
        run: scripts/ci/export-containerapp-deploy-metadata.sh "${AZ_WORKER_APP_NAME}"

      - name: Show deployed worker revision
        shell: bash
        run: scripts/ci/show-containerapp-revision.sh "${AZ_WORKER_APP_NAME}"

  report:
    needs: [prepare, await_db_migration_approval, deploy_web, deploy_worker]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Summarize staging deployment
        shell: bash
        env:
          ANY: ${{ needs.prepare.outputs.any }}
          DEPLOY_WEB: ${{ needs.prepare.outputs.deploy_web }}
          DEPLOY_WORKER: ${{ needs.prepare.outputs.deploy_worker }}
          DB_SQL_CHANGED: ${{ needs.prepare.outputs.db_sql_changed }}
          DB_APPROVAL_RESULT: ${{ needs.await_db_migration_approval.result }}
          PREPARE_REASON: ${{ needs.prepare.outputs.reason }}
          CHANGED_PATHS: ${{ needs.prepare.outputs.changed_paths }}
          APP_VERSION: ${{ needs.prepare.outputs.app_version }}
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
          WEB_RESULT: ${{ needs.deploy_web.result }}
          WEB_APP_NAME: ${{ needs.deploy_web.outputs.app_name }}
          WEB_REVISION: ${{ needs.deploy_web.outputs.revision }}
          WEB_URL: ${{ needs.deploy_web.outputs.url }}
          WEB_IMAGE: ${{ needs.deploy_web.outputs.image }}
          WORKER_RESULT: ${{ needs.deploy_worker.result }}
          WORKER_APP_NAME: ${{ needs.deploy_worker.outputs.app_name }}
          WORKER_REVISION: ${{ needs.deploy_worker.outputs.revision }}
          WORKER_URL: ${{ needs.deploy_worker.outputs.url }}
          WORKER_IMAGE: ${{ needs.deploy_worker.outputs.image }}
        run: |
          set -euo pipefail

          describe_target() {
            local target_name="$1"
            local requested="$2"
            local result="$3"
            local revision="$4"
            local url="$5"
            local image="$6"

            if [[ "${requested}" != "true" ]]; then
              printf '%s\t%s\t%s\t%s\t%s\n' "${target_name}" "skipped (unchanged)" "-" "-" "-"
              return
            fi

            case "${result}" in
              success)
                printf '%s\t%s\t%s\t%s\t%s\n' \
                  "${target_name}" \
                  "deployed" \
                  "${revision:-n/a}" \
                  "${url:-n/a}" \
                  "${image:-n/a}"
                ;;
              skipped)
                if [[ "${DB_SQL_CHANGED}" == "true" && "${DB_APPROVAL_RESULT}" != "success" ]]; then
                  printf '%s\t%s\t%s\t%s\t%s\n' "${target_name}" "blocked pending DB approval" "-" "-" "-"
                else
                  printf '%s\t%s\t%s\t%s\t%s\n' "${target_name}" "skipped" "-" "-" "-"
                fi
                ;;
              failure)
                printf '%s\t%s\t%s\t%s\t%s\n' "${target_name}" "failed" "-" "-" "-"
                ;;
              cancelled)
                printf '%s\t%s\t%s\t%s\t%s\n' "${target_name}" "cancelled" "-" "-" "-"
                ;;
              *)
                printf '%s\t%s\t%s\t%s\t%s\n' "${target_name}" "${result:-unknown}" "-" "-" "-"
                ;;
            esac
          }

          overall_status="completed"
          overall_message="Staging deployment completed."

          if [[ "${ANY}" != "true" ]]; then
            overall_status="skipped"
            overall_message="No deployable app changes were detected."
          elif [[ "${DB_SQL_CHANGED}" == "true" && "${DB_APPROVAL_RESULT}" != "success" ]]; then
            overall_status="blocked"
            overall_message="Deployment is blocked pending manual DB migration approval."
          elif [[ "${WEB_RESULT}" == "failure" || "${WORKER_RESULT}" == "failure" ]]; then
            overall_status="failed"
            overall_message="Deployment failed before all requested targets were updated."
          elif [[ "${WEB_RESULT}" == "cancelled" || "${WORKER_RESULT}" == "cancelled" ]]; then
            overall_status="cancelled"
            overall_message="Deployment was cancelled before all requested targets were updated."
          fi

          web_row="$(describe_target "web" "${DEPLOY_WEB}" "${WEB_RESULT}" "${WEB_REVISION}" "${WEB_URL}" "${WEB_IMAGE}")"
          worker_row="$(describe_target "worker" "${DEPLOY_WORKER}" "${WORKER_RESULT}" "${WORKER_REVISION}" "${WORKER_URL}" "${WORKER_IMAGE}")"

          echo "${overall_message}"
          echo "status=${overall_status}"
          echo "reason=${PREPARE_REASON}"
          echo "changed_paths=${CHANGED_PATHS}"
          printf 'target\tstatus\trevision\turl\timage\n%s\n%s\n' "${web_row}" "${worker_row}"

          {
            echo "## Staging deployment report"
            echo
            echo "- Outcome: ${overall_status}"
            echo "- Summary: ${overall_message}"
            echo "- App version: ${APP_VERSION}"
            echo "- Image tag: ${IMAGE_TAG}"
            echo "- Reason: ${PREPARE_REASON}"
            echo "- Changed paths: ${CHANGED_PATHS:-none}"
            echo
            echo "| Target | Status | Revision | URL | Image |"
            echo "| --- | --- | --- | --- | --- |"
            IFS=$'\t' read -r web_target web_status web_revision web_url web_image <<<"${web_row}"
            IFS=$'\t' read -r worker_target worker_status worker_revision worker_url worker_image <<<"${worker_row}"
            echo "| ${web_target} | ${web_status} | ${web_revision} | ${web_url} | ${web_image} |"
            echo "| ${worker_target} | ${worker_status} | ${worker_revision} | ${worker_url} | ${worker_image} |"
          } >> "${GITHUB_STEP_SUMMARY}"
